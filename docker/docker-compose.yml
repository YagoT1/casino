version: '3.9'
services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ../frontend
    env_file:
      - ../frontend/.env.example
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    depends_on:
      - postgres
      - redis
    ports:
      - '4000:4000'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
      POSTGRES_DB: casino
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:
